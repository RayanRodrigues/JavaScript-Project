name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 "${{ secrets.RENDER_HEALTH_URL }}"
          echo "Ping successful"
