name: Code Quality and Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint web
        run: npm run lint --workspace web

      - name: Lint api
        run: npm run lint --workspace api

      - name: Install rolldown Linux binding
        run: npm install --no-save @rolldown/binding-linux-x64-gnu@1.0.0-rc.15

      - name: Build web
        run: npm run build --workspace web

      - name: Build api
        run: npm run build --workspace api

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Run web tests
        run: npm run test --workspace web
