name: Code Quality and Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ENV: test
      VITE_ENV: test
      VITE_API_URL: http://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint web
        run: npm run lint --workspace web

      - name: Lint api
        run: npm run lint --workspace api

      - name: Build api
        run: npm run build --workspace api

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ENV: test
      VITE_ENV: test
      VITE_API_URL: http://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Run web tests
        run: npm run test --workspace web

      - name: Run api tests
        run: npm run test --workspace api
